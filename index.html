<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>א.ש ניהול פיננסי</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iNyIgZmlsbD0iIzRmNDZlNSIvPjx0ZXh0IHg9IjE2IiB5PSIyMiIgZm9udC1mYW1pbHk9IkhlZWJvLCBBcmlhbCwgc2Fucy1zZXJpZiIgZm9udC1zaXplPSIxNiIgZm9udC13ZWlnaHQ9IjgwMCIgZmlsbD0iI2ZmZmZmZiIgdGV4dC1hbmNob3I9Im1pZGRsZSI+15DXqTwvdGV4dD48Y2lyY2xlIGN4PSIyNSIgY3k9IjgiIHI9IjQiIGZpbGw9IiNmNTllMGIiLz48L3N2Zz4K" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">🎛️ מערכת ניהול - א.ש ניהול פיננסי</div>
    <div class="company-switch">
      <label>חברה:</label>
      <select id="companySelect"></select>
    </div>
    <div id="statusPills" class="pills"></div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="home">🏠 בית</button>
    <button class="tab" data-tab="events">אירועים ויומן</button>
    <button class="tab" data-tab="clients">מסמכים ולקוחות</button>
    <button class="tab" data-tab="invoicing">🧾 חשבוניות</button>
    <button class="tab" data-tab="quotes">📄 הצעות מחיר</button>
    <button class="tab" data-tab="contractors">קבלנים</button>
    <button class="tab" data-tab="payroll">עובדים</button>
    <button class="tab" data-tab="bank">🏦 בנק</button>
    <button class="tab" data-tab="team">👥 הצוות</button>
    <button class="tab" data-tab="connections">🔌 חיבורים</button>
    <button class="tab" data-tab="business">🏢 פרטי העסק</button>
  </nav>

  <main id="content"></main>

  <!-- מודל הדבקת הודעת ווטסאפ -->
  <div id="ingestModal" class="modal hidden">
    <div class="modal-card">
      <h3>הדבקת הודעת אירוע מווטסאפ</h3>
      <p class="muted">הדבק את ההודעה כפי שהיא (תאריך / זמר / תמחור / מיקום / סאונד / עובדים / תוספת / קבלן). המערכת תנתח אוטומטית.</p>
      <textarea id="ingestText" rows="10" placeholder="תאריך: 20/07/2026&#10;זמר: ...&#10;תמחור: ...&#10;מיקום: ...&#10;סאונד: ...&#10;עובדים: ...&#10;תוספת לעובדים: ...&#10;קבלן: ..."></textarea>
      <div class="modal-actions">
        <button id="ingestCancel" class="btn ghost">ביטול</button>
        <button id="ingestSave" class="btn primary">נתח ושמור</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
